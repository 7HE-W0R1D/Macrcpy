name: Macrcpy

options:
  bundleIdPrefix: com.berry.macrcpy
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Macrcpy:
    type: application
    platform: macOS
    sources:
      - path: Macrcpy
      - path: nmap_bundled
        type: folder
    settings:
      base:
        PRODUCT_NAME: Macrcpy
        PRODUCT_BUNDLE_IDENTIFIER: com.berry.macrcpy
        INFOPLIST_FILE: Macrcpy/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Macrcpy/Macrcpy.entitlements
        ENABLE_APP_SANDBOX: NO
